# neo4j compose fragment — included by the gateway when `neo4j` is enabled in
# config/services.yml. Caddy reverse-proxies to `neo4j:7474` over the
# project's default docker network; no public port bindings here.
#
# For ad-hoc local poking you can still reach neo4j via:
#   docker compose -f docker-compose.yml -f docker-compose.generated.yml exec neo4j cypher-shell -u $NEO4J_USER -p $NEO4J_PASSWORD

services:
  neo4j:
    image: neo4j:trixie
    restart: unless-stopped
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      # NEO4J_AUTH is `user/password`; split it inside the container shell.
      # Any NEO4J_* env beyond NEO4J_AUTH would be interpreted as a neo4j config
      # setting and refuse to start (strict_validation), so we can't just pass
      # NEO4J_USER/NEO4J_PASSWORD through.
      test: ["CMD-SHELL", "cypher-shell -u \"$${NEO4J_AUTH%%/*}\" -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1;' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

volumes:
  neo4j_data:
  neo4j_logs:
